<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosteyezzzz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            font-family: monospace;
            color: #0aff9d;
            height: 100vh;
        }

        /* Cursed Matrix Title */
        #title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #0aff9d, 0 0 20px #0aff9d;
            animation: glitch 2s infinite;
            z-index: 10;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(3deg); }
            40% { transform: skew(-3deg); }
            60% { transform: skew(2deg); }
            80% { transform: skew(-2deg); }
            100% { transform: skew(0deg); }
        }

        /* Floating ghosteyezzzz images */
        .ghost {
            position: absolute;
            width: 260px;
            height: 260px;
            opacity: 0.7;
            animation: fade 6s infinite ease-in-out, invertCycle 6s infinite steps(2);
            object-fit: contain;
        }

        @keyframes fade {
            0% { opacity: 0; transform: scale(0.8); }
            25% { opacity: 1; transform: scale(1); }
            50% { opacity: 0; transform: scale(1.2); }
            75% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        @keyframes invertCycle {
            0% { filter: invert(0); }
            50% { filter: invert(1); }
            100% { filter: invert(0); }
        }

        /* Bouncing Blu-ray style text */
        #bounceText {
            position: absolute;
            font-size: 2rem;
            color: #0aff9d;
            text-shadow: 0 0 10px #0aff9d;
            z-index: 20;
            white-space: nowrap;
        }

        /* Mini Terminal */
        #terminal {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #0aff9d;
            border-radius: 4px;
            padding: 15px;
            z-index: 30;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(10, 255, 157, 0.4), inset 0 0 10px rgba(10, 255, 157, 0.1);
            font-size: 0.85rem;
            line-height: 1.8;
            min-width: 320px;
        }

        .terminal-line {
            color: #0aff9d;
            margin: 4px 0;
            text-shadow: 0 0 5px rgba(10, 255, 157, 0.5);
        }

        .terminal-label {
            opacity: 0.6;
            display: inline-block;
            min-width: 100px;
        }

        .terminal-value {
            opacity: 1;
            font-weight: bold;
        }

        .terminal-success {
            color: #44ff44;
            text-shadow: 0 0 5px rgba(68, 255, 68, 0.5);
        }

        .terminal-error {
            color: #ff4444;
            text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
        }

        .terminal-loading {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        .terminal-button-group {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        #connectBtn, #buyBtn, #refreshBtn, #stopBtn, #disconnectBtn {
            padding: 8px 12px;
            background: #0aff9d;
            color: black;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
            transition: all 0.3s;
            font-family: monospace;
            flex: 1;
        }

        #connectBtn:hover, #buyBtn:hover, #refreshBtn:hover, #stopBtn:hover, #disconnectBtn:hover {
            background: #08cc7f;
            box-shadow: 0 0 10px rgba(10, 255, 157, 0.6);
        }

        #connectBtn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #disconnectBtn {
            background: #666;
            flex: 0.5;
        }

        #disconnectBtn:hover {
            background: #555;
        }

        #stopBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }

        .divider {
            height: 1px;
            background: rgba(10, 255, 157, 0.2);
            margin: 8px 0;
        }

        @media (max-width: 600px) {
            #terminal {
                bottom: 60px;
                left: 10px;
                right: 10px;
                max-width: none;
                font-size: 0.75rem;
            }

            #stopBtn {
                bottom: 10px;
                right: 10px;
                padding: 8px 10px;
                font-size: 0.75rem;
            }

            .terminal-button-group {
                flex-wrap: wrap;
            }

            #connectBtn, #buyBtn, #refreshBtn, #disconnectBtn {
                flex: 1 1 calc(50% - 4px);
            }
        }
    </style>
</head>
<body>

    <div id="title">Ghosteyezzzz</div>

    <!-- Floating eye images -->
    <img src="eye-gradient.png" class="ghost" style="top:10%; left:20%; animation-delay:0s;" alt="Ghosteyezzzz 1">
    <img src="eye-gradient.png" class="ghost" style="top:50%; left:60%; animation-delay:2s;" alt="Ghosteyezzzz 2">
    <img src="eye-gradient.png" class="ghost" style="top:70%; left:30%; animation-delay:4s;" alt="Ghosteyezzzz 3">

    <div id="bounceText">Ghosteyezzzz is for sleep and fun</div>

    <!-- Mini Terminal -->
    <div id="terminal">
        <div class="terminal-line">
            <span class="terminal-label">> system</span>
            <span class="terminal-value">ELUR TOKEN v1.0</span>
        </div>
        
        <div id="terminalContent">
            <div class="terminal-line">
                <span class="terminal-label">> status</span>
                <span class="terminal-value">awaiting connection</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="terminal-button-group">
            <button id="connectBtn" type="button">🔗 Connect</button>
            <button id="buyBtn" type="button" style="display:none;">💎 Buy</button>
            <button id="refreshBtn" type="button" style="display:none;">🔄 Refresh</button>
            <button id="disconnectBtn" type="button" style="display:none;">✕</button>
        </div>
    </div>

    <button id="stopBtn" type="button">Stop Animations</button>

    <script>
        console.log('🔮 Ghosteyezzzz initialized');

        const TOKEN_MINT = 'ELURv1srPxU12BCQc1NuPMUB2aCavtZHJtXtuNCtT2FC';
        const PHANTOM_TRADE_URL = `https://trade.phantom.com/token/${TOKEN_MINT}`;
        
        let walletConnected = false;
        let userWallet = null;

        // Better RPC endpoints (with fallbacks)
        const RPC_ENDPOINTS = [
            'https://api.helius-rpc.com/?api-key=fake', // Helius free
            'https://rpc.ankr.com/solana',               // Ankr
            'https://solana-api.projectserum.com',       // Project Serum
            'https://api.mainnet-beta.solana.com'        // Solana official (last resort)
        ];

        function updateTerminal(lines) {
            const content = document.getElementById('terminalContent');
            content.innerHTML = lines.map(line => {
                if (line.type === 'success') {
                    return `<div class="terminal-line"><span class="terminal-label">> ${line.label}</span> <span class="terminal-value terminal-success">${line.value}</span></div>`;
                } else if (line.type === 'error') {
                    return `<div class="terminal-line"><span class="terminal-label">> ${line.label}</span> <span class="terminal-value terminal-error">${line.value}</span></div>`;
                } else if (line.type === 'loading') {
                    return `<div class="terminal-line"><span class="terminal-label">> ${line.label}</span> <span class="terminal-value terminal-loading">${line.value}</span></div>`;
                }
                return `<div class="terminal-line"><span class="terminal-label">> ${line.label}</span> <span class="terminal-value">${line.value}</span></div>`;
            }).join('');
        }

        function isPhantomInstalled() {
            return !!(window.solana && window.solana.isPhantom);
        }

        async function connectPhantomWallet() {
            console.log('🔗 Connecting to Phantom...');
            
            if (!isPhantomInstalled()) {
                updateTerminal([
                    { label: 'error', value: 'Phantom not installed', type: 'error' }
                ]);
                return;
            }

            const connectBtn = document.getElementById('connectBtn');
            connectBtn.disabled = true;
            updateTerminal([
                { label: 'status', value: 'connecting...', type: 'loading' }
            ]);

            try {
                const response = await window.solana.connect();
                userWallet = response.publicKey.toString();
                walletConnected = true;

                console.log('✅ Connected:', userWallet);

                updateTerminal([
                    { label: 'wallet', value: userWallet.slice(0, 4) + '...' + userWallet.slice(-4), type: 'success' },
                    { label: 'status', value: 'connected', type: 'success' },
                    { label: 'balance', value: 'fetching...', type: 'loading' }
                ]);

                document.getElementById('buyBtn').style.display = 'inline-block';
                document.getElementById('refreshBtn').style.display = 'inline-block';
                document.getElementById('disconnectBtn').style.display = 'inline-block';
                document.getElementById('connectBtn').style.display = 'none';

                await updateTokenBalance();

            } catch (error) {
                console.error('❌ Connection failed:', error);
                updateTerminal([
                    { label: 'error', value: error.message, type: 'error' }
                ]);
                connectBtn.disabled = false;
            }
        }

        async function updateTokenBalance() {
            if (!userWallet) return;

            console.log('💰 Fetching balance...');
            updateTerminal([
                { label: 'wallet', value: userWallet.slice(0, 4) + '...' + userWallet.slice(-4), type: 'success' },
                { label: 'status', value: 'connected', type: 'success' },
                { label: 'balance', value: 'querying blockchain...', type: 'loading' }
            ]);

            // Try each RPC endpoint
            for (let i = 0; i < RPC_ENDPOINTS.length; i++) {
                try {
                    console.log(`Trying RPC endpoint ${i + 1}/${RPC_ENDPOINTS.length}`);
                    
                    const response = await fetch(RPC_ENDPOINTS[i], {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            id: 1,
                            method: 'getTokenAccountsByOwner',
                            params: [
                                userWallet,
                                { mint: TOKEN_MINT },
                                { encoding: 'jsonParsed' }
                            ]
                        })
                    });

                    const data = await response.json();

                    if (data.error) {
                        console.log(`Endpoint ${i + 1} error:`, data.error.message);
                        continue;
                    }

                    if (data.result && data.result.value.length > 0) {
                        const tokenAccount = data.result.value[0];
                        const balance = tokenAccount.account.data.parsed.info.tokenAmount.uiAmount || 0;
                        const estimatedPrice = 0.001;
                        const usdValue = (balance * estimatedPrice).toFixed(2);

                        console.log('✅ Balance found:', balance);

                        updateTerminal([
                            { label: 'wallet', value: userWallet.slice(0, 4) + '...' + userWallet.slice(-4), type: 'success' },
                            { label: 'status', value: 'connected', type: 'success' },
                            { label: 'balance', value: `${balance.toFixed(2)} ELUR`, type: 'success' },
                            { label: 'value', value: `$${usdValue} USD`, type: 'success' }
                        ]);
                        return;
                    } else {
                        console.log('No token account found');
                        updateTerminal([
                            { label: 'wallet', value: userWallet.slice(0, 4) + '...' + userWallet.slice(-4), type: 'success' },
                            { label: 'status', value: 'connected', type: 'success' },
                            { label: 'balance', value: '0.00 ELUR', type: 'success' },
                            { label: 'note', value: 'buy tokens to begin', type: 'success' }
                        ]);
                        return;
                    }
                } catch (error) {
                    console.log(`Endpoint ${i + 1} failed:`, error.message);
                }
            }

            // All endpoints failed
            updateTerminal([
                { label: 'wallet', value: userWallet.slice(0, 4) + '...' + userWallet.slice(-4), type: 'success' },
                { label: 'status', value: 'connected', type: 'success' },
                { label: 'balance', value: 'query failed - retry', type: 'error' }
            ]);
        }

        function buyTokens() {
            console.log('💎 Opening Phantom trade...');
            window.open(PHANTOM_TRADE_URL, '_blank');
            setTimeout(() => {
                if (walletConnected) {
                    updateTokenBalance();
                }
            }, 3000);
        }

        function disconnectWallet() {
            console.log('❌ Disconnecting...');
            if (window.solana) {
                window.solana.disconnect();
            }
            walletConnected = false;
            userWallet = null;

            updateTerminal([
                { label: 'status', value: 'disconnected', type: 'success' }
            ]);

            document.getElementById('connectBtn').style.display = 'inline-block';
            document.getElementById('buyBtn').style.display = 'none';
            document.getElementById('refreshBtn').style.display = 'none';
            document.getElementById('disconnectBtn').style.display = 'none';
        }

        // Event listeners
        document.getElementById('connectBtn').addEventListener('click', connectPhantomWallet);
        document.getElementById('buyBtn').addEventListener('click', buyTokens);
        document.getElementById('refreshBtn').addEventListener('click', updateTokenBalance);
        document.getElementById('disconnectBtn').addEventListener('click', disconnectWallet);

        // Check for existing connection
        async function checkPhantomConnection() {
            if (isPhantomInstalled()) {
                try {
                    const response = await window.solana.connect({ onlyIfTrusted: true });
                    userWallet = response.publicKey.toString();
                    walletConnected = true;

                    console.log('🔄 Auto-connected:', userWallet);

                    updateTerminal([
                        { label: 'wallet', value: userWallet.slice(0, 4) + '...' + userWallet.slice(-4), type: 'success' },
                        { label: 'status', value: 'connected', type: 'success' },
                        { label: 'balance', value: 'fetching...', type: 'loading' }
                    ]);

                    document.getElementById('buyBtn').style.display = 'inline-block';
                    document.getElementById('refreshBtn').style.display = 'inline-block';
                    document.getElementById('disconnectBtn').style.display = 'inline-block';
                    document.getElementById('connectBtn').style.display = 'none';

                    await updateTokenBalance();
                } catch (error) {
                    console.log('Not previously connected');
                }
            }
        }

        // Animations
        const text = document.getElementById("bounceText");
        let x = 100, y = 100;
        let dx = 2, dy = 2;
        let animating = true;

        function bounce() {
            if (!animating) return;
            const w = window.innerWidth;
            const h = window.innerHeight;
            x += dx;
            y += dy;

            if (x <= 0 || x + text.clientWidth >= w) dx *= -1;
            if (y <= 0 || y + text.clientHeight >= h) dy *= -1;

            text.style.left = x + "px";
            text.style.top = y + "px";
            bounceInterval = requestAnimationFrame(bounce);
        }
        let bounceInterval = requestAnimationFrame(bounce);

        document.getElementById("stopBtn").addEventListener('click', () => {
            animating = false;
            document.querySelectorAll(".ghost").forEach(el => el.style.animation = "none");
            text.style.animation = "none";
            cancelAnimationFrame(bounceInterval);
            document.getElementById("stopBtn").innerHTML = "Animations Stopped ⏸";
        });

        // Initialize
        checkPhantomConnection();
    </script>
</body>
</html>
