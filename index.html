<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosteyezzzz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            font-family: monospace;
            color: #0aff9d;
            height: 100vh;
        }

        /* Cursed Matrix Title */
        #title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #0aff9d, 0 0 20px #0aff9d;
            animation: glitch 2s infinite;
            z-index: 10;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(3deg); }
            40% { transform: skew(-3deg); }
            60% { transform: skew(2deg); }
            80% { transform: skew(-2deg); }
            100% { transform: skew(0deg); }
        }

        /* Floating ghosteyezzzz images */
        .ghost {
            position: absolute;
            width: 260px;
            height: 260px;
            opacity: 0.7;
            animation: fade 6s infinite ease-in-out, invertCycle 6s infinite steps(2);
        }

        @keyframes fade {
            0% { opacity: 0; transform: scale(0.8); }
            25% { opacity: 1; transform: scale(1); }
            50% { opacity: 0; transform: scale(1.2); }
            75% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        @keyframes invertCycle {
            0% { filter: invert(0); }
            50% { filter: invert(1); }
            100% { filter: invert(0); }
        }

        /* Bouncing Blu-ray style text */
        #bounceText {
            position: absolute;
            font-size: 2rem;
            color: #0aff9d;
            text-shadow: 0 0 10px #0aff9d;
            z-index: 20;
            white-space: nowrap;
        }

        /* Wallet Panel */
        #walletPanel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0aff9d;
            border-radius: 8px;
            padding: 20px;
            z-index: 30;
            max-width: 350px;
            box-shadow: 0 0 15px rgba(10, 255, 157, 0.3);
            min-width: 300px;
        }

        #walletPanel h3 {
            color: #0aff9d;
            margin-bottom: 12px;
            text-shadow: 0 0 10px #0aff9d;
            font-size: 1.2rem;
        }

        .wallet-info {
            margin: 10px 0;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .wallet-label {
            color: #0aff9d;
            opacity: 0.7;
        }

        .wallet-value {
            color: #0aff9d;
            word-break: break-all;
            margin-top: 4px;
            font-size: 0.85rem;
        }

        #connectBtn, #buyBtn, #stopBtn, #disconnectBtn {
            padding: 10px 16px;
            background: #0aff9d;
            color: black;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 4px;
            margin: 8px 4px 8px 0;
            font-weight: bold;
            transition: all 0.3s;
            font-family: monospace;
        }

        #connectBtn:hover, #buyBtn:hover, #stopBtn:hover, #disconnectBtn:hover {
            background: #08cc7f;
            box-shadow: 0 0 10px rgba(10, 255, 157, 0.5);
        }

        #connectBtn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #disconnectBtn {
            background: #666;
        }

        #disconnectBtn:hover {
            background: #555;
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 8px;
            text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
        }

        .success {
            color: #44ff44;
            font-size: 0.85rem;
            margin-top: 8px;
            text-shadow: 0 0 5px rgba(68, 255, 68, 0.5);
        }

        #stopBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }

        @media (max-width: 600px) {
            #walletPanel {
                bottom: 60px;
                left: 10px;
                right: 10px;
                max-width: none;
            }

            #stopBtn {
                bottom: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div id="title">Ghosteyezzzz</div>

    <!-- Floating eye images - using new gradient eye -->
    <img src="eye-gradient.png" class="ghost" style="top:10%; left:20%; animation-delay:0s;" alt="Ghosteyezzzz graphic 1">
    <img src="eye-gradient.png" class="ghost" style="top:50%; left:60%; animation-delay:2s;" alt="Ghosteyezzzz graphic 2">
    <img src="eye-gradient.png" class="ghost" style="top:70%; left:30%; animation-delay:4s;" alt="Ghosteyezzzz graphic 3">

    <div id="bounceText">Ghosteyezzzz is for sleep and fun</div>

    <!-- Wallet Integration Panel -->
    <div id="walletPanel">
        <h3>💎 ELUR Token</h3>
        
        <div id="disconnected">
            <button id="connectBtn">Connect Phantom</button>
            <div class="wallet-info" style="color: #888; font-size: 0.85rem;">
                Connect your Phantom wallet to buy tokens and track your investment.
            </div>
        </div>

        <div id="connected" style="display: none;">
            <div class="wallet-info">
                <div class="wallet-label">Wallet Address:</div>
                <div class="wallet-value" id="walletAddress">-</div>
            </div>

            <div class="wallet-info">
                <div class="wallet-label">Your Balance:</div>
                <div class="wallet-value"><span id="tokenBalance">0</span> ELUR</div>
            </div>

            <div class="wallet-info">
                <div class="wallet-label">USD Value:</div>
                <div class="wallet-value">$<span id="usdValue">0.00</span></div>
            </div>

            <button id="buyBtn">Buy on Phantom</button>
            <button id="disconnectBtn">Disconnect</button>

            <div id="errorMsg" class="error"></div>
            <div id="successMsg" class="success"></div>
        </div>
    </div>

    <button id="stopBtn">Stop Animations</button>

    <script>
        // Token configuration
        const TOKEN_MINT = 'ELURv1srPxU12BCQc1NuPMUB2aCavtZHJtXtuNCtT2FC';
        const TOKEN_NAME = 'ELUR';
        const PHANTOM_TRADE_URL = `https://trade.phantom.com/token/${TOKEN_MINT}`;

        // Phantom wallet integration
        let walletConnected = false;
        let userWallet = null;

        // Check if Phantom is installed
        function isPhantomInstalled() {
            return window.solana && window.solana.isPhantom;
        }

        // Connect to Phantom
        async function connectPhantomWallet() {
            if (!isPhantomInstalled()) {
                showError('Phantom wallet not found. Please install it from https://phantom.app');
                return;
            }

            try {
                const connectBtn = document.getElementById('connectBtn');
                connectBtn.disabled = true;
                connectBtn.innerHTML = '<span class="loading">⏳</span> Connecting...';

                const response = await window.solana.connect();
                userWallet = response.publicKey.toString();
                walletConnected = true;

                document.getElementById('disconnected').style.display = 'none';
                document.getElementById('connected').style.display = 'block';
                document.getElementById('walletAddress').textContent = userWallet.slice(0, 4) + '...' + userWallet.slice(-4);

                showSuccess('Wallet connected!');
                await updateTokenBalance();

                connectBtn.disabled = false;
                connectBtn.innerHTML = 'Connect Phantom';

            } catch (error) {
                console.error('Connection error:', error);
                showError('Failed to connect wallet: ' + error.message);
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('connectBtn').innerHTML = 'Connect Phantom';
            }
        }

        // Disconnect wallet
        function disconnectWallet() {
            if (window.solana) {
                window.solana.disconnect();
            }
            walletConnected = false;
            userWallet = null;
            document.getElementById('connected').style.display = 'none';
            document.getElementById('disconnected').style.display = 'block';
            showSuccess('Wallet disconnected');
        }

        // Fetch token balance from Solana blockchain
        async function updateTokenBalance() {
            if (!userWallet) return;

            try {
                // Using public RPC endpoint
                const response = await fetch('https://api.mainnet-beta.solana.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        id: 1,
                        method: 'getTokenAccountsByOwner',
                        params: [
                            userWallet,
                            { mint: TOKEN_MINT },
                            { encoding: 'jsonParsed' }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.result && data.result.value.length > 0) {
                    const tokenAccount = data.result.value[0];
                    const balance = tokenAccount.account.data.parsed.info.tokenAmount.uiAmount || 0;
                    
                    document.getElementById('tokenBalance').textContent = balance.toFixed(2);
                    
                    // Estimate USD value (you can update this with real price data)
                    const estimatedPrice = 0.001; // Update this with actual price from CoinGecko/CoinMarketCap
                    document.getElementById('usdValue').textContent = (balance * estimatedPrice).toFixed(2);
                    
                    showSuccess('Balance updated!');
                } else {
                    // No token account found (user hasn't bought yet)
                    document.getElementById('tokenBalance').textContent = '0';
                    document.getElementById('usdValue').textContent = '0.00';
                }
            } catch (error) {
                console.error('Balance fetch error:', error);
                // Don't show error to user - balance will show as 0
            }
        }

        // Open Phantom trade page
        function buyTokens() {
            window.open(PHANTOM_TRADE_URL, '_blank');
            // Auto-refresh balance after 5 seconds in case they completed purchase
            setTimeout(() => {
                if (walletConnected) {
                    updateTokenBalance();
                }
            }, 5000);
        }

        // UI helpers
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = '❌ ' + msg;
            setTimeout(() => { errorDiv.textContent = ''; }, 4000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = '✅ ' + msg;
            setTimeout(() => { successDiv.textContent = ''; }, 3000);
        }

        // Event listeners
        document.getElementById('connectBtn').addEventListener('click', connectPhantomWallet);
        document.getElementById('buyBtn').addEventListener('click', buyTokens);
        document.getElementById('disconnectBtn').addEventListener('click', disconnectWallet);

        // Check if Phantom is already connected (persistence)
        async function checkPhantomConnection() {
            if (isPhantomInstalled()) {
                try {
                    const response = await window.solana.connect({ onlyIfTrusted: true });
                    userWallet = response.publicKey.toString();
                    walletConnected = true;
                    document.getElementById('disconnected').style.display = 'none';
                    document.getElementById('connected').style.display = 'block';
                    document.getElementById('walletAddress').textContent = userWallet.slice(0, 4) + '...' + userWallet.slice(-4);
                    await updateTokenBalance();
                } catch (error) {
                    // Not connected, that's fine
                }
            }
        }

        // Original animations code
        const text = document.getElementById("bounceText");
        let x = 100, y = 100;
        let dx = 2, dy = 2;
        let animating = true;

        function bounce() {
            if (!animating) return;
            const w = window.innerWidth;
            const h = window.innerHeight;
            x += dx;
            y += dy;

            if (x <= 0 || x + text.clientWidth >= w) dx *= -1;
            if (y <= 0 || y + text.clientHeight >= h) dy *= -1;

            text.style.left = x + "px";
            text.style.top = y + "px";
            bounceInterval = requestAnimationFrame(bounce);
        }
        let bounceInterval = requestAnimationFrame(bounce);

        // Stop animations button
        document.getElementById("stopBtn").addEventListener('click', () => {
            animating = false;
            document.querySelectorAll(".ghost").forEach(el => el.style.animation = "none");
            text.style.animation = "none";
            cancelAnimationFrame(bounceInterval);
            document.getElementById("stopBtn").innerHTML = "Animations Stopped ⏸";
        });

        // Check Phantom connection on page load
        window.addEventListener('load', checkPhantomConnection);
    </script>
</body>
</html>
